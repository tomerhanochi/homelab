---
cluster-init: true

##############################
##### NODE CONFIGURATION #####
##############################
node-name: control-plane

##############################
######### NETWORKING #########
##############################
cluster-cidr: 10.42.0.0/16
service-cidr: 10.43.0.0/16

##############################
########### ADDONS ###########
##############################
disable:
  - traefik
  - servicelb

##############################
######### COMPONENTS #########
##############################
disable-cloud-controller: true
# helm-controller is ENABLED: it installs Cilium (the CNI) from the HelmChart in
# apps/cilium at bootstrap (`bootstrap: true`, so its install Job runs on the host
# network before any CNI exists). See apps/cilium/helmchart.yaml.
# Disable network policy controller as cilium brings its own.
disable-network-policy: true
# Disable kube-proxy as cillium provides a replacement.
disable-kube-proxy: true
# Disable flannel as cillium is installed.
flannel-backend: "none"

##############################
############ ETCD ############
##############################
# Every day, at 04:00.
etcd-snapshot-schedule-cron: "0 4 * * *"
etcd-snapshot-retention: 7  # snapshots

##############################
######### KUBECONFIG #########
##############################
write-kubeconfig: /var/lib/rancher/k3s/kubeconfig
write-kubeconfig-mode: "0640"
write-kubeconfig-group: root

##############################
######## OBSERVABILITY #######
##############################
etcd-expose-metrics: true

##############################
########## SECURITY ##########
##############################
selinux: true
# https://docs.k3s.io/security/hardening-guide#configuration-for-kubernetes-components
protect-kernel-defaults: true
secrets-encryption: true
kube-apiserver-arg:
  - "enable-admission-plugins=NodeRestriction"
  - "admission-control-config-file=/usr/lib/rancher/k3s/server/admissionconfigurations/pod-security.yaml"
  - "audit-policy-file=/usr/lib/rancher/k3s/server/policies/audit.yaml"
  - "audit-log-path=/var/log/rancher/k3s/audit.log"
  - "audit-log-maxage=30"
  - "audit-log-maxbackup=10"
  - "audit-log-maxsize=100"
  - "feature-gates=ImageVolume=true"
  - "request-timeout=60s"
  # OIDC / SSO via authentik. The issuer is authentik's per-application URL for
  # the "kubernetes" OIDC provider (declared as a blueprint). These become active
  # once authentik is deployed and reachable; an unreachable issuer at boot is
  # non-fatal (OIDC auth simply fails until it resolves). authentik is served
  # with a publicly-trusted Let's Encrypt certificate, so no custom CA file is
  # needed. Authenticated users/groups are bound via RBAC using the oidc:
  # prefixes; authenticate kubectl with kubelogin (see INSTALLATION.md).
  - "oidc-issuer-url=https://sso.tomerhanochi.com/application/o/kubernetes/"
  - "oidc-client-id=kubernetes"
  - "oidc-username-claim=email"
  - "oidc-username-prefix=oidc:"
  - "oidc-groups-claim=groups"
  - "oidc-groups-prefix=oidc:"
kube-controller-manager-arg:
  - 'terminated-pod-gc-threshold=10'
kubelet-arg:
  - 'streaming-connection-idle-timeout=5m'
  - "tls-cipher-suites=TLS_ECDHE_ECDSA_WITH_AES_256_GCM_SHA384,TLS_ECDHE_RSA_WITH_AES_256_GCM_SHA384,TLS_ECDHE_ECDSA_WITH_AES_128_GCM_SHA256,TLS_ECDHE_RSA_WITH_AES_128_GCM_SHA256,TLS_ECDHE_ECDSA_WITH_CHACHA20_POLY1305,TLS_ECDHE_RSA_WITH_CHACHA20_POLY1305"
