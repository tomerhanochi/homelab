# k3s auto-deploys manifests from /var/lib/rancher/k3s/server/manifests, but /var
# is machine-local, not part of the image. Seed it from the copies shipped in the
# image's /usr tree. `C` copies only when the destination does not exist, so it
# seeds a fresh machine without clobbering what k3s writes there itself later.
C /var/lib/rancher/k3s/server/manifests 0700 root root - /usr/lib/rancher/k3s/server/manifests
