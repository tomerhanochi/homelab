---
name: Build bootstrap image

"on":
  push:
    branches:
      - main
    paths:
      - images/bootstrap/**
      - .github/workflows/bootstrap.yml
  workflow_dispatch:

env:
  REGISTRY: ghcr.io

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      attestations: write
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Read image version
        id: version
        run: echo "value=$(cat images/bootstrap/VERSION)" >> "${GITHUB_OUTPUT}"
      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3
      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository }}/internal/bootstrap
          tags: |-
            type=raw,value=${{ steps.version.outputs.value }}
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,format=long
      - name: Build and push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: images/bootstrap
          file: images/bootstrap/Containerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
      - name: Generate artifact attestation
        uses: actions/attest-build-provenance@v2
        with:
          subject-name: ${{ env.REGISTRY }}/${{ github.repository }}/internal/bootstrap
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true
