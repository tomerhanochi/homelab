---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  # The GitOps Toolkit controllers + the GitRepository/root Kustomization. Having
  # the root Kustomization reconcile this makes Flux self-managing: bumping the
  # toolkit version in gotk-components.yaml is applied by Flux itself.
  - flux-system
  # One Flux Kustomization per app.
  - cluster
