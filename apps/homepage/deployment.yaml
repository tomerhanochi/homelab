---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: homepage
  namespace: homepage
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: homepage
  template:
    metadata:
      labels:
        app.kubernetes.io/name: homepage
    spec:
      # Grants Kubernetes service discovery / cluster resource widgets.
      serviceAccountName: homepage
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        # gethomepage dashboard linking to all homelab services.
        - name: homepage
          image: ghcr.io/gethomepage/homepage:v1.13.2@sha256:a0b71c8e757298d02560186bab9fbe3fc2d375c523a62cc1019177b37e48aa28
          ports:
            - name: http
              containerPort: 3000
          env:
            # Required since v1.0: homepage rejects proxied requests whose Host
            # header is not in this allowlist.
            - name: HOMEPAGE_ALLOWED_HOSTS
              value: home.tomerhanochi.com
          volumeMounts:
            # Config is delivered read-only via ConfigMap.
            - name: config
              mountPath: /app/config
            # Homepage writes logs under /app/config/logs; keep it writable.
            - name: logs
              mountPath: /app/config/logs
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /
              port: http
            periodSeconds: 15
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities:
              drop:
                - ALL
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
      volumes:
        - name: config
          configMap:
            name: homepage
        - name: logs
          emptyDir: {}
