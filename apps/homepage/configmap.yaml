---
apiVersion: v1
kind: ConfigMap
metadata:
  name: homepage
  namespace: homepage
data:
  settings.yaml: |
    ---
    title: Homelab
    headerStyle: clean
    layout:
      Media:
        style: row
        columns: 3
      Library:
        style: row
        columns: 2
      Infra:
        style: row
        columns: 4

  services.yaml: |
    ---
    - Media:
        - Jellyfin:
            href: https://jellyfin.tomerhanochi.com
            description: Movies and TV streaming
            icon: jellyfin.png
        - Jellyseerr:
            href: https://jellyseerr.tomerhanochi.com
            description: Media requests
            icon: jellyseerr.png
        - qBittorrent:
            href: https://torrent.tomerhanochi.com
            description: Torrent client
            icon: qbittorrent.png
    - Library:
        - Kavita:
            href: https://kavita.tomerhanochi.com
            description: Books and comics
            icon: kavita.png
        - Paperless:
            href: https://paperless.tomerhanochi.com
            description: Document archive
            icon: paperless-ngx.png
    - Infra:
        - Forgejo:
            href: https://git.tomerhanochi.com
            description: Git forge
            icon: forgejo.png
        - authentik:
            href: https://sso.tomerhanochi.com
            description: OIDC provider (SSO)
            icon: authentik.png
        - Headlamp:
            href: https://headlamp.tomerhanochi.com
            description: Kubernetes console
            icon: headlamp.png

  widgets.yaml: |
    ---
    - resources:
        cpu: true
        memory: true
    - kubernetes:
        cluster:
          show: true
          cpu: true
          memory: true
          showLabel: true
          label: cluster
        nodes:
          show: false

  bookmarks.yaml: |
    ---
    []

  kubernetes.yaml: |
    ---
    mode: cluster

  docker.yaml: |
    ---
    {}
