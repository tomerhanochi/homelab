---
apiVersion: hydra.ory.sh/v1alpha1
kind: OAuth2Client
metadata:
  name: argocd
  namespace: argocd
spec:
  secretName: argocd-client-secret
  grantTypes:
    - authorization_code
    - refresh_token
  responseTypes:
    - code
  scope: openid offline_access
  redirectUris:
    - https://argocd.tomerhanochi.com/auth/callback
  tokenEndpointAuthMethod: client_secret_post
