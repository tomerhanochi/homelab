---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - namespace.yaml
  - networkpolicy.yaml

generators:
  - ./secret-generator.yaml

helmCharts:
  - name: argo-cd
    repo: https://argoproj.github.io/argo-helm
    version: 9.4.6
    releaseName: argocd
    namespace: argocd
    valuesFile: values.yaml

labels:
  - pairs:
      app.kubernetes.io/part-of: argocd
