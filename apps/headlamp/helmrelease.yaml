---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: headlamp
  namespace: headlamp
spec:
  interval: 30m
  chart:
    spec:
      chart: headlamp
      version: 0.43.0
      sourceRef:
        kind: HelmRepository
        name: headlamp
  values:
    # The chart has no image.digest field, but `name:tag@digest` is a valid image
    # reference, so pin the digest through the tag.
    image:
      registry: ghcr.io
      repository: headlamp-k8s/headlamp
      tag: v0.43.0@sha256:5d03caa26df7a715079405df2949907160518750b9b62b6bf4de8d1a6142c541

    config:
      # Served at a subdomain root, so no base URL sub-path.
      baseURL: ""
      # OIDC/SSO login against authentik. The client id/secret/issuer/scopes come
      # from the existing (SOPS-encrypted) headlamp-oidc secret. Headlamp forwards
      # the OIDC id_token to the kube-apiserver, which trusts the same authentik
      # issuer; authorization is via cluster RBAC bound to oidc: users/groups.
      oidc:
        secret:
          create: false
        externalSecret:
          enabled: true
          name: headlamp-oidc
          hasScopes: true

    # Headlamp acts purely as an OIDC proxy — every Kubernetes call carries the
    # user's own token — so its ServiceAccount needs no cluster permissions. Drop
    # the chart's default ServiceAccount->cluster-admin binding.
    serviceAccount:
      create: true
    clusterRoleBinding:
      create: false

    # Exposed via the shared Cilium Gateway (HTTPRoute), not an Ingress.
    ingress:
      enabled: false

    service:
      type: ClusterIP
      port: 80

    # restricted PSA. UID 100 / GID 101 are the non-root ids the headlamp image
    # already runs as (the chart's own container securityContext defaults to
    # runAsUser: 100 / runAsGroup: 101); fsGroup mirrors the group.
    podSecurityContext:
      runAsNonRoot: true
      runAsUser: 100
      runAsGroup: 101
      fsGroup: 101
      seccompProfile:
        type: RuntimeDefault

    # Container-level securityContext (the chart maps this onto the headlamp
    # container). readOnlyRootFilesystem is left false: headlamp writes plugin
    # and runtime data under its home directory, and no writable volume is
    # mounted here.
    securityContext:
      runAsNonRoot: true
      runAsUser: 100
      runAsGroup: 101
      allowPrivilegeEscalation: false
      readOnlyRootFilesystem: false
      capabilities:
        drop:
          - ALL
      seccompProfile:
        type: RuntimeDefault

    resources:
      requests:
        cpu: 50m
        memory: 128Mi
      limits:
        cpu: 500m
        memory: 256Mi
