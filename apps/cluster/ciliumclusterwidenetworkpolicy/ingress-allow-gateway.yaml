---
# Cluster-wide replacement for the per-app "ingress-allow-gateway" policies. Any
# pod that opts in with the label gateway.tomerhanochi.com/exposed: "true"
# accepts ingress from the Cilium gateway/ingress proxy (reserved "ingress"
# entity), regardless of namespace.
apiVersion: cilium.io/v2
kind: CiliumClusterwideNetworkPolicy
metadata:
  name: ingress-allow-gateway
spec:
  description: Allow gateway ingress to pods labeled gateway.tomerhanochi.com/exposed.
  endpointSelector:
    matchLabels:
      gateway.tomerhanochi.com/exposed: "true"
  ingress:
    - fromEntities:
        - ingress
