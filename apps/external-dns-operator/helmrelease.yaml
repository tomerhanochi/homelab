---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: external-dns
  namespace: external-dns
spec:
  interval: 30m
  chart:
    spec:
      chart: external-dns
      version: "1.21.1"
      sourceRef:
        kind: HelmRepository
        name: external-dns
        namespace: external-dns
      interval: 12h
  install:
    crds: Create
  upgrade:
    crds: CreateReplace
  values:
    sources:
      - gateway-httproute
    domainFilters:
      - tomerhanochi.com
    zoneIdFilters:
      - 9ef59cbb1bf2c9f8de74829f8148a9e7

    registry: txt
    txtOwnerId: homelab
    txtPrefix: externaldns-

    provider:
      name: cloudflare
    env:
      - name: CF_API_TOKEN
        valueFrom:
          secretKeyRef:
            name: cloudflare-api-token
            key: api-token
