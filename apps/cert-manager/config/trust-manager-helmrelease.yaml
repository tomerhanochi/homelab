---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: trust-manager
  namespace: cert-manager
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: trust-manager
  install:
    crds: Create
  upgrade:
    crds: CreateReplace
  values:
    app:
      trust:
        namespace: cert-manager
