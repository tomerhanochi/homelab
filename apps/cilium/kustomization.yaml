---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  # Gateway API CRDs are installed here (cilium has no Flux dependencies, so it
  # reconciles first) because both Cilium's Gateway controller and cert-manager's
  # Gateway integration require them to be present at startup. v1.6 promoted
  # TCPRoute (used for forgejo SSH) to the standard channel, so no experimental
  # channel is needed.
  - https://github.com/kubernetes-sigs/gateway-api/releases/download/v1.6.1/standard-install.yaml
  - namespace.yaml
  - ocirepository.yaml
  - helmrelease.yaml

configMapGenerator:
  - name: cilium-values
    namespace: cilium
    files:
      - values.yaml
    options:
      disableNameSuffixHash: true

labels:
  - pairs:
      app.kubernetes.io/part-of: cilium
