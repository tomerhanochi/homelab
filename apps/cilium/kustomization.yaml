---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - namespace.yaml

helmCharts:
  - name: cilium
    repo: https://helm.cilium.io
    version: 1.19.1
    releaseName: cilium
    namespace: cilium
    valuesFile: values.yaml

labels:
  - pairs:
      app.kubernetes.io/part-of: cilium
