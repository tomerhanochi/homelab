---
# Cilium is the CNI, so it must be up before Flux (whose controllers are pods and
# need a working network). It therefore cannot be installed BY Flux; instead k3s'
# built-in helm-controller installs it from this manifest.
#
# Bootstrap once with `kubectl apply -k apps/cilium` (see INSTALLATION.md); Flux
# then reconciles this very same file, so there is a single source of truth for
# the chart version and values — nothing is restated in the install guide.
#
# `bootstrap: true` is load-bearing: it makes helm-controller run the install Job
# with hostNetwork + node-not-ready/network-unavailable tolerations, so it can
# install the CNI on a node that has no CNI yet (otherwise the Job would hang in
# ContainerCreating forever). Requires the k3s helm-controller to be enabled
# (see images/os/.../k3s/config.yaml).
apiVersion: helm.cattle.io/v1
kind: HelmChart
metadata:
  name: cilium
  namespace: kube-system
spec:
  bootstrap: true
  repo: https://helm.cilium.io
  chart: cilium
  version: 1.19.6
  targetNamespace: cilium
  valuesContent: |-
    namespaceOverride: cilium

    kubeProxyReplacement: true
    # K3S proxies the API server to 127.0.0.1:6444.
    k8sServiceHost: 127.0.0.1
    k8sServicePort: 6444

    routingMode: native
    bpf:
      datapathMode: netkit
      masquerade: true
      distributedLRU:
        enabled: true
      mapDynamicSizeRatio: 0.08
    bpfClockProbe: true

    autoDirectNodeRoutes: true
    ipv4:
      enabled: true
    ipv4NativeRoutingCIDR: "10.0.0.0/8"

    ipv6:
      enabled: false

    ipam:
      mode: cluster-pool

    hubble:
      enabled: false

    bandwidthManager:
      enabled: false

    operator:
      enabled: true
      replicas: 1

    envoy:
      enabled: true

    l2announcements:
      enabled: true

    gatewayAPI:
      enabled: true
