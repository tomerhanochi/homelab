---
# Default-deny ingress for every namespace except kube-system and cilium. Allows
# are layered on by other cluster-wide policies and per-app rules. Egress is
# intentionally unrestricted for now (to be hardened later).
apiVersion: cilium.io/v2
kind: CiliumClusterwideNetworkPolicy
metadata:
  name: default-deny
spec:
  endpointSelector:
    matchExpressions:
      - key: k8s:io.kubernetes.pod.namespace
        operator: NotIn
        values:
          - kube-system
          - cilium
  ingress: []
