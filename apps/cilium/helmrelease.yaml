---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: cilium
  namespace: cilium
spec:
  interval: 30m
  releaseName: cilium
  chartRef:
    kind: OCIRepository
    name: cilium
  # Cilium is the CNI, so it is bootstrapped manually with `helm install` before
  # Flux exists (see INSTALLATION.md). This HelmRelease adopts that existing
  # release and keeps it reconciled from Git thereafter. Values live in
  # values.yaml (single source of truth, also used by the bootstrap command) and
  # are surfaced to Helm via the cilium-values ConfigMap.
  install:
    crds: Create
  upgrade:
    crds: CreateReplace
  valuesFrom:
    - kind: ConfigMap
      name: cilium-values
      valuesKey: values.yaml
