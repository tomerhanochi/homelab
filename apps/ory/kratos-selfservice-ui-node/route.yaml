---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: accounts
  namespace: ory
spec:
  parentRefs:
    - name: default
      namespace: gateway
      sectionName: accounts
  hostnames:
    - accounts.tomerhanochi.com
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /kratos/
      filters:
        - type: URLRewrite
          urlRewrite:
            path:
              type: ReplacePrefixMatch
              replacePrefixMatch: /
      backendRefs:
        - name: kratos-public
          port: 80
    - backendRefs:
        - name: kratos-selfservice-ui-node
          port: 80
