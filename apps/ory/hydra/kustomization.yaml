---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - postgres-cluster.yaml
  - server-certificate.yaml
  - replication-certificate.yaml
  - route.yaml

generators:
  - secret-generator.yaml

helmCharts:
  - name: hydra
    repo: https://k8s.ory.sh/helm/charts
    version: 0.61.0
    releaseName: hydra
    namespace: ory
    valuesFile: values.yaml
    includeCRDs: true
