---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: ingress-allow-cilium-envoy
  namespace: ory
spec:
  podSelector: {}
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: cilium
          podSelector:
            matchLabels:
              app.kubernetes.io/name: cilium-envoy
