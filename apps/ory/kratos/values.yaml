---
kratos:
  automigration:
    enabled: true
    type: initContainer
  config:
    serve:
      public:
        port: 4433
        base_url: https://identity.tomerhanochi.com
      admin:
        port: 4434
        base_url: http://kratos-admin.ory.svc.cluster.local
    identity:
      default_schema_id: default
      schemas:
        - id: default
          url: file:///etc/config/identity.default.schema.json
    selfservice:
      default_browser_return_url: https://accounts.tomerhanochi.com/
      methods:
        passkey:
          enabled: true
          config:
            rp:
              display_name: Homelab
              id: accounts.tomerhanochi.com
              origins:
                - https://accounts.tomerhanochi.com
        password:
          enabled: false
        totp:
          enabled: false
        lookup_secret:
          enabled: false
        link:
          enabled: false
        code:
          enabled: false
      flows:
        login:
          ui_url: https://accounts.tomerhanochi.com/login
          lifespan: 10m
        registration:
          ui_url: https://accounts.tomerhanochi.com/registration
          lifespan: 10m
          after:
            passkey:
              hooks:
                - hook: session
        recovery:
          enabled: false
        verification:
          enabled: false
        settings:
          ui_url: https://accounts.tomerhanochi.com/settings
          privileged_session_max_age: 15m
        error:
          ui_url: https://accounts.tomerhanochi.com/error
        logout:
          after:
            default_browser_return_url: https://accounts.tomerhanochi.com/login
    log:
      format: json
      level: info
    session:
      cookie:
        domain: accounts.tomerhanochi.com
        same_site: Lax
        secure: "true"
      lifespan: 24h
  identitySchemas:
    identity.default.schema.json: |
      {
        "$id": "default",
        "$schema": "http://json-schema.org/draft-07/schema#",
        "title": "Default Identity Schema",
        "type": "object",
        "properties": {
          "traits": {
            "type": "object",
            "properties": {
              "username": {
                "type": "string",
                "minLength": 3,
                "maxLength": 32,
                "title": "Username",
                "ory.sh/kratos": {
                  "credentials": {
                    "passkey": {
                      "display_name": true
                    }
                  }
                }
              }
            },
            "required": ["username"],
            "additionalProperties": false
          }
        }
      }

secret:
  enabled: false
  nameOverride: kratos

deployment:
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 128Mi
  extraVolumes:
    - name: postgres-ca
      secret:
        secretName: kratos-database-ca
  extraVolumeMounts:
    - name: postgres-ca
      mountPath: /var/run/secrets/postgres
      readOnly: true

service:
  public:
    type: ClusterIP
  admin:
    type: ClusterIP

courier:
  enabled: false
