---
# Jellyfin Helm Chart Values
# https://github.com/jellyfin/jellyfin-helm/tree/master/charts/jellyfin

# Disable DLNA and service discovery (not needed with static DNS)
jellyfin:
  enableDLNA: false
  publishDiscovery: false

  # Resource requests and limits for single-node deployment
  resources:
    requests:
      cpu: 500m
      memory: 1Gi
    limits:
      cpu: 4000m
      memory: 8Gi

# Service configuration
service:
  type: ClusterIP
  port: 8096
  portName: http

# Ingress configuration using Tailscale (without funnel!)
ingress:
  enabled: true
  className: tailscale
  annotations:
    tailscale.com/proxy-group: tailscale-ingress-proxy-group
    # Explicitly disable funnel - we don't want public exposure
    tailscale.com/funnel: "false"
  hosts:
    - host: jellyfin

# Persistence configuration
persistence:
  # Config - regular PVC for persistent settings (not taken on external drive)
  config:
    enabled: true
    accessMode: ReadWriteOnce
    size: 5Gi
    storageClass: ""
    type: pvc

  # Media - hostPath PV for media storage (TODO: set actual path)
  media:
    enabled: true
    type: hostPath
    # TODO: Replace with actual media storage path on the host
    hostPath: ""
    accessMode: ReadWriteOnce

  # Cache - emptyDir for caching (single node, no need for PV)
  cache:
    enabled: true
    type: emptyDir
    accessMode: ReadWriteOnce

# Network policies for hardening
networkPolicy:
  enabled: true
  policyTypes:
    - Ingress
    - Egress

  # Ingress rules - only allow from Tailscale ingress namespace
  ingress:
    allowExternal: false
    # Allow traffic from Tailscale operator namespace
    namespaceSelector:
      kubernetes.io/metadata.name: tailscale
    podSelector: {}
    customRules: []

  # Egress rules - restricted for security
  egress:
    allowDNS: true
    dnsNamespace: kube-system
    dnsPodSelector:
      k8s-app: kube-dns
    allowAllEgress: false
    restrictedEgress:
      allowMetadata: false
      allowInCluster: true
      # Allow communication with Authentik for LDAP
      allowedCIDRs: []
    customRules:
      # Allow LDAP connection to Authentik
      - to:
          - namespaceSelector:
              matchLabels:
                kubernetes.io/metadata.name: authentik
        ports:
          - protocol: TCP
            port: 3389
      # Allow DNS to kube-system
      - to:
          - namespaceSelector:
              matchLabels:
                kubernetes.io/metadata.name: kube-system
        ports:
          - protocol: UDP
            port: 53
          - protocol: TCP
            port: 53

# Security contexts
podSecurityContext:
  fsGroup: 1000

securityContext:
  runAsNonRoot: true
  runAsUser: 1000
  runAsGroup: 1000
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: false
  capabilities:
    drop:
      - ALL

# Service account
serviceAccount:
  create: true
  automount: false

# Pod privileges (disabled for security)
podPrivileges:
  hostIPC: false
  hostNetwork: false
  hostPID: false

# Deployment settings
replicaCount: 1
deploymentStrategy:
  type: Recreate

# Metrics (disabled by default)
metrics:
  enabled: false
  serviceMonitor:
    enabled: false
