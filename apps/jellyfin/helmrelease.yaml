---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: jellyfin
  namespace: jellyfin
spec:
  interval: 30m
  chart:
    spec:
      chart: jellyfin
      version: "3.2.0"
      sourceRef:
        kind: HelmRepository
        name: jellyfin
  values:
    # Disable DLNA and service discovery (not needed with static DNS).
    jellyfin:
      enableDLNA: false
      publishDiscovery: false
      resources:
        requests:
          cpu: 500m
          memory: 1Gi
        limits:
          cpu: 4000m
          memory: 8Gi

    service:
      type: ClusterIP
      port: 8096
      portName: http

    # Exposed via the Gateway API HTTPRoute (route.yaml), not the chart ingress.
    ingress:
      enabled: false

    persistence:
      # Persistent settings/metadata on a dynamically-provisioned PVC.
      config:
        enabled: true
        accessMode: ReadWriteOnce
        size: 5Gi
        storageClass: ""
        type: pvc
      # Read-only view of the shared media library (see apps/AGENTS.md storage
      # convention). Only the clean library is mounted, not the download dir.
      media:
        enabled: true
        type: hostPath
        hostPath: /var/mnt/data/media
        accessMode: ReadOnlyMany
      cache:
        enabled: true
        type: emptyDir
        accessMode: ReadWriteOnce

    # NetworkPolicies are managed via CiliumNetworkPolicy in networkpolicies/.
    networkPolicy:
      enabled: false

    podSecurityContext:
      fsGroup: 1000

    securityContext:
      runAsNonRoot: true
      runAsUser: 1000
      runAsGroup: 1000
      allowPrivilegeEscalation: false
      readOnlyRootFilesystem: false
      capabilities:
        drop:
          - ALL

    serviceAccount:
      create: true
      automount: false

    podPrivileges:
      hostIPC: false
      hostNetwork: false
      hostPID: false

    replicaCount: 1
    deploymentStrategy:
      type: Recreate

    metrics:
      enabled: false
      serviceMonitor:
        enabled: false
