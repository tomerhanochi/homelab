---
apiVersion: v1
kind: Secret
metadata:
  name: jellyfin-ldap
  namespace: jellyfin
type: Opaque
stringData:
  # LDAP bind DN for Jellyfin to connect to Authentik
  # Create an LDAP provider in Authentik and use the bind credentials here
  LDAP_BIND_DN: "cn=jellyfin,ou=users,dc=ldap,dc=goauthentik,dc=io"
  # TODO: Replace with actual bind password from Authentik LDAP provider
  LDAP_BIND_PASSWORD: "CHANGE_ME"
