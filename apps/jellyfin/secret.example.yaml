# TEMPLATE ONLY — the real secret ships SOPS-encrypted in this directory
# (oidc-secret.sops.yaml); this file just documents its shape. Not referenced by
# kustomization.
#
# Consumed by the jellyfin-oidc-setup Job. The local admin is created by the
# first-run wizard and kept alongside SSO so you can't be locked out.
# OIDC_CLIENT_SECRET MUST match JELLYFIN_CLIENT_SECRET in
# apps/authentik/oidc-secret.sops.yaml.
---
apiVersion: v1
kind: Secret
metadata:
  name: jellyfin-oidc
  namespace: jellyfin
type: Opaque
stringData:
  JELLYFIN_ADMIN_USER: admin
  JELLYFIN_ADMIN_PASSWORD: "REPLACE_WITH_RANDOM_PASSWORD"
  OIDC_CLIENT_SECRET: "REPLACE_WITH_OIDC_CLIENT_SECRET"
