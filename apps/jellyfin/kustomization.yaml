---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - namespace.yaml

helmCharts:
  - name: jellyfin
    repo: https://jellyfin.github.io/jellyfin-helm
    version: 1.11.1
    releaseName: jellyfin
    namespace: jellyfin
    valuesFile: values.yaml

labels:
  - pairs:
      app.kubernetes.io/part-of: jellyfin
