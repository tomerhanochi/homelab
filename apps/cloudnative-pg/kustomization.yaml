---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - namespace.yaml

helmCharts:
  - name: cloudnative-pg
    repo: https://cloudnative-pg.github.io/charts
    version: 0.27.1
    releaseName: cloudnative-pg
    namespace: cloudnative-pg
    valuesFile: values.yaml

labels:
  - pairs:
      app.kubernetes.io/part-of: cloudnative-pg
