---
# Flux reconciles from github.com and pulls Helm/OCI artifacts (ghcr.io, chart
# repos) over HTTPS, and applies to the apiserver.
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: egress-allow-external
  namespace: flux-system
spec:
  endpointSelector: {}
  egress:
    - toEntities:
        - kube-apiserver
    - toEntities:
        - world
      toPorts:
        - ports:
            - port: "443"
              protocol: TCP
