---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: kavita
  namespace: flux-system
spec:
  interval: 10m
  retryInterval: 1m
  timeout: 5m
  path: ./apps/kavita
  prune: true
  wait: true
  # Recreate resources on immutable-field changes (e.g. Service/selectors).
  force: true
  sourceRef:
    kind: GitRepository
    name: homelab
  dependsOn:
    - name: gateway
    - name: authentik
  decryption:
    provider: sops
    secretRef:
      name: sops-age
