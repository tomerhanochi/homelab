---
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: atuin-database
  namespace: atuin
spec:
  instances: 1
  storage:
    size: 2Gi
  monitoring:
    enablePodMonitor: false
  bootstrap:
    initdb:
      database: atuin
      owner: atuin
      secret:
        name: atuin-database-credentials
