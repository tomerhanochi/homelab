# TEMPLATE ONLY — the real secret is generated and SOPS-encrypted at bootstrap;
# see scripts/. Not referenced by kustomization.
---
apiVersion: v1
kind: Secret
metadata:
  name: atuin-secrets
  namespace: atuin
type: Opaque
stringData:
  # Postgres DSN for the atuin server.
  ATUIN_DB_URI: postgres://atuin:PASSWORD@atuin-database-rw.atuin.svc:5432/atuin?sslmode=require
---
# Consumed by CloudNativePG (bootstrap.initdb.secret) to create the atuin role.
apiVersion: v1
kind: Secret
metadata:
  name: atuin-database-credentials
  namespace: atuin
type: kubernetes.io/basic-auth
stringData:
  username: atuin
  password: PASSWORD
