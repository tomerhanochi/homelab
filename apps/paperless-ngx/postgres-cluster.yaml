---
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: paperless-ngx-database
  namespace: paperless-ngx
spec:
  instances: 1
  storage:
    size: 5Gi
  monitoring:
    enablePodMonitor: false
  bootstrap:
    initdb:
      database: paperless
      owner: paperless
      secret:
        name: paperless-ngx-database-credentials
