# TEMPLATE ONLY — the real secret is generated and SOPS-encrypted at bootstrap;
# see scripts/. Not referenced by kustomization.
#
# Two secrets are consumed by this app:
#   * paperless-ngx-secrets            — templated below
#   * paperless-ngx-database-credentials — the CNPG initdb secret (basic-auth
#     type with keys `username` and `password`), also generated at bootstrap.
---
apiVersion: v1
kind: Secret
metadata:
  name: paperless-ngx-secrets
  namespace: paperless-ngx
type: Opaque
stringData:
  # Django secret key — random 50+ char string.
  PAPERLESS_SECRET_KEY: "REPLACE_WITH_RANDOM_SECRET_KEY"
  # Password for the `paperless` Postgres user (must match the value in
  # paperless-ngx-database-credentials).
  PAPERLESS_DBPASS: "REPLACE_WITH_DB_PASSWORD"
  # JSON blob wiring the pocket-id OIDC provider (django-allauth). The client
  # id/secret come from the OIDC client created in pocket-id at bootstrap.
  # Redirect URI: https://paperless.tomerhanochi.com/accounts/oidc/pocketid/login/callback/
  PAPERLESS_SOCIALACCOUNT_PROVIDERS: |
    {
      "openid_connect": {
        "APPS": [
          {
            "provider_id": "pocketid",
            "name": "Pocket ID",
            "client_id": "REPLACE_WITH_OIDC_CLIENT_ID",
            "secret": "REPLACE_WITH_OIDC_CLIENT_SECRET",
            "settings": {
              "server_url": "https://sso.tomerhanochi.com/.well-known/openid-configuration"
            }
          }
        ]
      }
    }
