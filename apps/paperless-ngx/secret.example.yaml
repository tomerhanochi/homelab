# TEMPLATE ONLY — the real secret ships SOPS-encrypted in this directory
# (*.sops.yaml); this file just documents its shape. Not referenced by kustomization.
#
# Two secrets are consumed by this app:
#   * paperless-ngx-secrets            — templated below
#   * paperless-ngx-database-credentials — the CNPG initdb secret (basic-auth
#     type with keys `username` and `password`), also generated at bootstrap.
---
apiVersion: v1
kind: Secret
metadata:
  name: paperless-ngx-secrets
  namespace: paperless-ngx
type: Opaque
stringData:
  # Django secret key — random 50+ char string.
  PAPERLESS_SECRET_KEY: "REPLACE_WITH_RANDOM_SECRET_KEY"
  # Password for the `paperless` Postgres user (must match the value in
  # paperless-ngx-database-credentials).
  PAPERLESS_DBPASS: "REPLACE_WITH_DB_PASSWORD"
  # JSON blob wiring the authentik OIDC provider (django-allauth). The client
  # id/secret match the authentik "paperless" provider declared in authentik's
  # blueprints (apps/authentik/blueprints/oidc-clients.yaml).
  # Redirect URI: https://paperless.tomerhanochi.com/accounts/oidc/authentik/login/callback/
  PAPERLESS_SOCIALACCOUNT_PROVIDERS: |
    {
      "openid_connect": {
        "APPS": [
          {
            "provider_id": "authentik",
            "name": "authentik",
            "client_id": "paperless",
            "secret": "REPLACE_WITH_OIDC_CLIENT_SECRET",
            "settings": {
              "server_url": "https://sso.tomerhanochi.com/application/o/paperless/.well-known/openid-configuration"
            }
          }
        ]
      }
    }
