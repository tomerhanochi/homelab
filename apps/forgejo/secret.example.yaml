# TEMPLATE ONLY — the real secret is generated and SOPS-encrypted at bootstrap;
# see scripts/. Not referenced by kustomization.
---
# CloudNativePG credentials for the forgejo-database cluster owner. The chart
# reads the password into FORGEJO__database__PASSWD via additionalConfigFromEnvs.
apiVersion: v1
kind: Secret
metadata:
  name: forgejo-database-credentials
  namespace: forgejo
type: kubernetes.io/basic-auth
stringData:
  username: forgejo
  password: REPLACE_WITH_RANDOM_PASSWORD
---
# OIDC client credentials from pocket-id. The chart's gitea.oauth existingSecret
# reads `key` (client id) and `secret` (client secret).
apiVersion: v1
kind: Secret
metadata:
  name: forgejo-oauth
  namespace: forgejo
type: Opaque
stringData:
  key: REPLACE_WITH_OIDC_CLIENT_ID
  secret: REPLACE_WITH_OIDC_CLIENT_SECRET
