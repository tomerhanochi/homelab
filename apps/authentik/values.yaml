---
# Global configuration
global:
  securityContext:
    runAsNonRoot: true
    runAsUser: 1000
    runAsGroup: 1000
    fsGroup: 1000
    seccompProfile:
      type: RuntimeDefault

# Authentik settings
authentik:
  log_level: info
  secret_key: file:///run/secrets/app/secret-key

# Blueprints configuration
blueprints:
  configMaps:
    - authentik-blueprints

# PostgreSQL configuration (connect to local cloudnative-pg cluster)
postgresql:
  host: authentik-db-rw
  name: authentik
  user: file:///run/secrets/postgres/username
  password: file:///run/secrets/postgres/password
  port: 5432

# Server configuration
server:
  replicas: 1
  service:
    type: ClusterIP
  containerSecurityContext:
    allowPrivilegeEscalation: false
    capabilities:
      drop:
        - ALL
  volumes:
    - name: argocd-client-secret
      secret:
        secretName: argocd-oidc-client-secret
    - name: jellyfin-client-secret
      secret:
        secretName: jellyfin-oidc-client-secret
    - name: authentik-secret
      secret:
        secretName: authentik-secret
    - name: postgres-credentials
      secret:
        secretName: authentik-database-credentials
  volumeMounts:
    - name: argocd-client-secret
      mountPath: /run/secrets/argocd
      readOnly: true
    - name: jellyfin-client-secret
      mountPath: /run/secrets/jellyfin
      readOnly: true
    - name: authentik-secret
      mountPath: /run/secrets/app
      readOnly: true
    - name: postgres-credentials
      mountPath: /run/secrets/postgres
      readOnly: true
  ingress:
    enabled: false
  metrics:
    enabled: false
    serviceMonitor:
      enabled: false

# Worker configuration
worker:
  replicas: 1
  containerSecurityContext:
    allowPrivilegeEscalation: false
    capabilities:
      drop:
        - ALL
  volumes:
    - name: argocd-client-secret
      secret:
        secretName: argocd-oidc-client-secret
    - name: jellyfin-client-secret
      secret:
        secretName: jellyfin-oidc-client-secret
    - name: authentik-secret
      secret:
        secretName: authentik-secret
    - name: postgres-credentials
      secret:
        secretName: authentik-database-credentials
  volumeMounts:
    - name: argocd-client-secret
      mountPath: /run/secrets/argocd
      readOnly: true
    - name: jellyfin-client-secret
      mountPath: /run/secrets/jellyfin
      readOnly: true
    - name: authentik-secret
      mountPath: /run/secrets/app
      readOnly: true
    - name: postgres-credentials
      mountPath: /run/secrets/postgres
      readOnly: true
  metrics:
    enabled: false
    serviceMonitor:
      enabled: false
