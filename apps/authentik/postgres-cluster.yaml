---
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: authentik-database
  namespace: authentik
spec:
  instances: 1
  storage:
    size: 5Gi
  monitoring:
    enablePodMonitor: false
  bootstrap:
    initdb:
      database: authentik
      owner: authentik
      secret:
        name: authentik-database-credentials
