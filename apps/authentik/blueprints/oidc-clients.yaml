---
version: 1
metadata:
  name: homelab-oidc-clients
entries:
  # authentik ships no "groups" scope mapping, but Kubernetes/Headlamp RBAC and
  # several apps map authorization to groups. Define one shared groups scope.
  - model: authentik_providers_oauth2.scopemapping
    state: present
    id: scope-groups
    identifiers:
      name: "Homelab OAuth Mapping: groups"
    attrs:
      name: "Homelab OAuth Mapping: groups"
      scope_name: groups
      description: "Group membership"
      expression: |
        return [group.name for group in request.user.ak_groups.all()]

  # authentik's built-in email scope hardcodes "email_verified": False, which some
  # apps (e.g. Kavita) treat as an unverified/unusable account. We have no email
  # verification step (registration is passkey-only), so emit email_verified: True.
  # Providers reference this instead of the built-in email scope mapping.
  - model: authentik_providers_oauth2.scopemapping
    state: present
    id: scope-email
    identifiers:
      name: "Homelab OAuth Mapping: email"
    attrs:
      name: "Homelab OAuth Mapping: email"
      scope_name: email
      description: "Email address (verified)"
      expression: |
        return {
            "email": request.user.email,
            "email_verified": True,
        }

  - model: authentik_core.group
    state: present
    id: group-forgejo-users
    identifiers:
      name: forgejo-users
  - model: authentik_core.group
    state: present
    id: group-forgejo-admins
    identifiers:
      name: forgejo-admins
  - model: authentik_core.group
    state: present
    id: group-kavita-login
    identifiers:
      name: kavita-Login
  - model: authentik_core.group
    state: present
    id: group-kavita-admin
    identifiers:
      name: kavita-Admin
  # Bound to the cluster-admin ClusterRole via apps/authentik/cluster-admins-rbac.yaml.
  # The k3s apiserver runs with oidc-groups-prefix=oidc:, so this group is seen
  # inside Kubernetes RBAC as "oidc:kubernetes-cluster-admins". Add users to it in
  # the authentik UI to grant them Headlamp/kubectl cluster-admin.
  - model: authentik_core.group
    state: present
    id: group-kubernetes-cluster-admins
    identifiers:
      name: kubernetes-cluster-admins

  # Jellyfin authorization groups. jellyfin-users gates login; jellyfin-admins
  # grants admin. The jellyfin-access-* groups gate library access by content
  # type. Membership is managed in the authentik UI.
  - model: authentik_core.group
    state: present
    id: group-jellyfin-users
    identifiers:
      name: jellyfin-users
  - model: authentik_core.group
    state: present
    id: group-jellyfin-admins
    identifiers:
      name: jellyfin-admins
  - model: authentik_core.group
    state: present
    id: group-jellyfin-access-movies
    identifiers:
      name: jellyfin-access-movies
  - model: authentik_core.group
    state: present
    id: group-jellyfin-access-books
    identifiers:
      name: jellyfin-access-books
  - model: authentik_core.group
    state: present
    id: group-jellyfin-access-shows
    identifiers:
      name: jellyfin-access-shows
  - model: authentik_core.group
    state: present
    id: group-jellyfin-access-music
    identifiers:
      name: jellyfin-access-music

  # ----------------------------------------------------------------- forgejo --
  - model: authentik_providers_oauth2.oauth2provider
    state: present
    id: forgejo-provider
    identifiers:
      name: forgejo
    attrs:
      name: forgejo
      client_type: confidential
      client_id: forgejo
      client_secret: !Env FORGEJO_CLIENT_SECRET
      authorization_flow: !Find [authentik_flows.flow, [slug, default-provider-authorization-implicit-consent]]
      invalidation_flow: !Find [authentik_flows.flow, [slug, default-provider-invalidation-flow]]
      signing_key: !Find [authentik_crypto.certificatekeypair, [name, "authentik Self-signed Certificate"]]
      grant_types:
        - authorization_code
        - refresh_token
      redirect_uris:
        - matching_mode: strict
          url: https://git.tomerhanochi.com/user/oauth2/authentik/callback
      property_mappings:
        - !Find [authentik_providers_oauth2.scopemapping, [scope_name, openid]]
        - !KeyOf scope-email
        - !Find [authentik_providers_oauth2.scopemapping, [scope_name, profile]]
        - !KeyOf scope-groups
  - model: authentik_core.application
    state: present
    identifiers:
      slug: forgejo
    attrs:
      name: Forgejo
      slug: forgejo
      provider: !KeyOf forgejo-provider
      meta_launch_url: https://git.tomerhanochi.com
      policy_engine_mode: any

  # --------------------------------------------------------------- headlamp ---
  - model: authentik_providers_oauth2.oauth2provider
    state: present
    id: headlamp-provider
    identifiers:
      name: headlamp
    attrs:
      name: headlamp
      client_type: confidential
      client_id: headlamp
      client_secret: !Env HEADLAMP_CLIENT_SECRET
      authorization_flow: !Find [authentik_flows.flow, [slug, default-provider-authorization-implicit-consent]]
      invalidation_flow: !Find [authentik_flows.flow, [slug, default-provider-invalidation-flow]]
      signing_key: !Find [authentik_crypto.certificatekeypair, [name, "authentik Self-signed Certificate"]]
      grant_types:
        - authorization_code
        - refresh_token
      redirect_uris:
        - matching_mode: strict
          url: https://headlamp.tomerhanochi.com/oidc-callback
      property_mappings:
        - !Find [authentik_providers_oauth2.scopemapping, [scope_name, openid]]
        - !KeyOf scope-email
        - !Find [authentik_providers_oauth2.scopemapping, [scope_name, profile]]
        - !Find [authentik_providers_oauth2.scopemapping, [scope_name, offline_access]]
        - !KeyOf scope-groups
  - model: authentik_core.application
    state: present
    identifiers:
      slug: headlamp
    attrs:
      name: Headlamp
      slug: headlamp
      provider: !KeyOf headlamp-provider
      meta_launch_url: https://headlamp.tomerhanochi.com
      policy_engine_mode: any

  # ------------------------------------------------------------- kubernetes ---
  # Issuer https://sso.tomerhanochi.com/application/o/kubernetes/ — must match the
  # k3s apiserver oidc-issuer-url and the kubelogin client. localhost redirects
  # are for kubelogin's local callback server.
  - model: authentik_providers_oauth2.oauth2provider
    state: present
    id: kubernetes-provider
    identifiers:
      name: kubernetes
    attrs:
      name: kubernetes
      client_type: confidential
      client_id: kubernetes
      client_secret: !Env KUBERNETES_CLIENT_SECRET
      authorization_flow: !Find [authentik_flows.flow, [slug, default-provider-authorization-implicit-consent]]
      invalidation_flow: !Find [authentik_flows.flow, [slug, default-provider-invalidation-flow]]
      signing_key: !Find [authentik_crypto.certificatekeypair, [name, "authentik Self-signed Certificate"]]
      grant_types:
        - authorization_code
        - refresh_token
      redirect_uris:
        - matching_mode: strict
          url: http://localhost:8000
        - matching_mode: strict
          url: http://localhost:18000
      property_mappings:
        - !Find [authentik_providers_oauth2.scopemapping, [scope_name, openid]]
        - !KeyOf scope-email
        - !Find [authentik_providers_oauth2.scopemapping, [scope_name, profile]]
        - !Find [authentik_providers_oauth2.scopemapping, [scope_name, offline_access]]
        - !KeyOf scope-groups
  - model: authentik_core.application
    state: present
    identifiers:
      slug: kubernetes
    attrs:
      name: Kubernetes
      slug: kubernetes
      provider: !KeyOf kubernetes-provider
      policy_engine_mode: any

  # --------------------------------------------------------------- jellyfin ---
  # Configured in Jellyfin's SSO plugin UI; provider name "authentik" gives the
  # redirect path /sso/OID/redirect/authentik.
  - model: authentik_providers_oauth2.oauth2provider
    state: present
    id: jellyfin-provider
    identifiers:
      name: jellyfin
    attrs:
      name: jellyfin
      client_type: confidential
      client_id: jellyfin
      client_secret: !Env JELLYFIN_CLIENT_SECRET
      authorization_flow: !Find [authentik_flows.flow, [slug, default-provider-authorization-implicit-consent]]
      invalidation_flow: !Find [authentik_flows.flow, [slug, default-provider-invalidation-flow]]
      signing_key: !Find [authentik_crypto.certificatekeypair, [name, "authentik Self-signed Certificate"]]
      grant_types:
        - authorization_code
        - refresh_token
      redirect_uris:
        - matching_mode: strict
          url: https://jellyfin.tomerhanochi.com/sso/OID/redirect/authentik
      property_mappings:
        - !Find [authentik_providers_oauth2.scopemapping, [scope_name, openid]]
        - !KeyOf scope-email
        - !Find [authentik_providers_oauth2.scopemapping, [scope_name, profile]]
        - !KeyOf scope-groups
  - model: authentik_core.application
    state: present
    identifiers:
      slug: jellyfin
    attrs:
      name: Jellyfin
      slug: jellyfin
      provider: !KeyOf jellyfin-provider
      meta_launch_url: https://jellyfin.tomerhanochi.com
      policy_engine_mode: any

  # ----------------------------------------------------------------- kavita ---
  # Configured in Kavita's OIDC settings UI; host-regex redirect keeps it robust
  # to Kavita's callback path.
  - model: authentik_providers_oauth2.oauth2provider
    state: present
    id: kavita-provider
    identifiers:
      name: kavita
    attrs:
      name: kavita
      client_type: confidential
      client_id: kavita
      client_secret: !Env KAVITA_CLIENT_SECRET
      authorization_flow: !Find [authentik_flows.flow, [slug, default-provider-authorization-implicit-consent]]
      invalidation_flow: !Find [authentik_flows.flow, [slug, default-provider-invalidation-flow]]
      signing_key: !Find [authentik_crypto.certificatekeypair, [name, "authentik Self-signed Certificate"]]
      grant_types:
        - authorization_code
        - refresh_token
      redirect_uris:
        - matching_mode: regex
          url: "https://kavita\\.tomerhanochi\\.com/.*"
      property_mappings:
        - !Find [authentik_providers_oauth2.scopemapping, [scope_name, openid]]
        - !KeyOf scope-email
        - !Find [authentik_providers_oauth2.scopemapping, [scope_name, profile]]
        - !KeyOf scope-groups
  - model: authentik_core.application
    state: present
    identifiers:
      slug: kavita
    attrs:
      name: Kavita
      slug: kavita
      provider: !KeyOf kavita-provider
      meta_launch_url: https://kavita.tomerhanochi.com
      policy_engine_mode: any
