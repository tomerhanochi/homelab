---
apiVersion: v1
kind: Namespace
metadata:
  name: media
  labels:
    inject-ca-bundle: "true"
    # Enforce the restricted Pod Security Standard explicitly (matches the
    # cluster default; documents intent now that jellyfin/seerr/sonarr/radarr
    # share this namespace and all run rootless).
    pod-security.kubernetes.io/enforce: restricted
    pod-security.kubernetes.io/enforce-version: latest
