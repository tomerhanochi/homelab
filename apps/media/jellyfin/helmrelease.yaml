---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: jellyfin
  namespace: media
spec:
  interval: 30m
  chart:
    spec:
      chart: jellyfin
      version: "3.2.0"
      sourceRef:
        kind: HelmRepository
        name: jellyfin
  values:
    # Disable DLNA and service discovery (not needed with static DNS).
    jellyfin:
      enableDLNA: false
      publishDiscovery: false
      resources:
        requests:
          cpu: 500m
          memory: 1Gi
        limits:
          cpu: 4000m
          memory: 8Gi

    service:
      type: ClusterIP
      port: 8096
      portName: http

    # Exposed via the Gateway API HTTPRoute (route.yaml), not the chart ingress.
    ingress:
      enabled: false

    persistence:
      # Persistent settings/metadata on a dynamically-provisioned PVC.
      config:
        enabled: true
        accessMode: ReadWriteOnce
        size: 5Gi
        storageClass: ""
        type: pvc
      # Read-only view of the shared media library via a statically-provisioned
      # local PV/PVC (see persistentvolume.yaml). restricted PSA forbids the
      # previous hostPath mount.
      media:
        enabled: true
        type: pvc
        existingClaim: jellyfin-media
        accessMode: ReadOnlyMany
      cache:
        enabled: true
        type: emptyDir
        accessMode: ReadWriteOnce

    # NetworkPolicies are managed via CiliumNetworkPolicy in networkpolicies/.
    networkPolicy:
      enabled: false

    podSecurityContext:
      fsGroup: 1000
      seccompProfile:
        type: RuntimeDefault

    securityContext:
      runAsNonRoot: true
      runAsUser: 1000
      runAsGroup: 1000
      allowPrivilegeEscalation: false
      readOnlyRootFilesystem: false
      capabilities:
        drop:
          - ALL
      seccompProfile:
        type: RuntimeDefault

    serviceAccount:
      create: true
      automount: false

    podPrivileges:
      hostIPC: false
      hostNetwork: false
      hostPID: false

    replicaCount: 1
    deploymentStrategy:
      type: Recreate

    # Extra pod volume: the jellyfin-bootstrap ConfigMap (plugin.url/sha256/dir),
    # read by the install-plugin initContainer below. Same config the
    # jellyfin-bootstrap daemon consumes (see bootstrap.yaml).
    volumes:
      - name: bootstrap-config
        configMap:
          name: jellyfin-bootstrap-config

    # Install the jellyfin-plugin-sso binary into the config volume before
    # Jellyfin starts, so the plugin is loaded on first boot (the jellyfin-
    # bootstrap daemon then configures it via the plugin API). Idempotent: skips
    # if the plugin is already present, so Jellyfin's own updates aren't clobbered.
    extraInitContainers:
      - name: install-sso-plugin
        image: ghcr.io/tomerhanochi/homelab/internal/bootstrap:0.1.0
        args: ["jellyfin", "install-plugin"]
        securityContext:
          runAsNonRoot: true
          runAsUser: 1000
          runAsGroup: 1000
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop:
              - ALL
          seccompProfile:
            type: RuntimeDefault
        volumeMounts:
          - name: config
            mountPath: /config
          - name: bootstrap-config
            mountPath: /etc/bootstrap/config.d
            readOnly: true

    metrics:
      enabled: false
      serviceMonitor:
        enabled: false
