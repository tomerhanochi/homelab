---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: jellyfin
  namespace: media
spec:
  interval: 30m
  chart:
    spec:
      chart: jellyfin
      version: "3.2.0"
      sourceRef:
        kind: HelmRepository
        name: jellyfin
  values:
    # Disable DLNA and service discovery (not needed with static DNS).
    jellyfin:
      enableDLNA: false
      publishDiscovery: false
      resources:
        requests:
          cpu: 500m
          memory: 1Gi
        limits:
          cpu: 4000m
          memory: 8Gi

    service:
      type: ClusterIP
      port: 8096
      portName: http

    # Exposed via the Gateway API HTTPRoute (route.yaml), not the chart ingress.
    ingress:
      enabled: false

    persistence:
      # Persistent settings/metadata on a dynamically-provisioned PVC.
      config:
        enabled: true
        accessMode: ReadWriteOnce
        size: 5Gi
        storageClass: ""
        type: pvc
      # Shared media library via a statically-provisioned hostPath PV/PVC
      # (see persistentvolume.yaml).
      media:
        enabled: true
        type: pvc
        existingClaim: jellyfin-media
        # Read-write so the library metadata savers (saveWithMedia in the
        # bootstrap config) can write NFO, artwork, subtitles, lyrics and
        # trickplay images alongside the media.
        accessMode: ReadWriteOnce
      cache:
        enabled: true
        type: emptyDir
        accessMode: ReadWriteOnce

    # NetworkPolicies are managed via CiliumNetworkPolicy in networkpolicies/.
    networkPolicy:
      enabled: false

    podSecurityContext:
      fsGroup: 1000
      seccompProfile:
        type: RuntimeDefault

    securityContext:
      runAsNonRoot: true
      runAsUser: 1000
      runAsGroup: 1000
      allowPrivilegeEscalation: false
      readOnlyRootFilesystem: false
      capabilities:
        drop:
          - ALL
      seccompProfile:
        type: RuntimeDefault

    serviceAccount:
      create: true
      automount: false

    podPrivileges:
      hostIPC: false
      hostNetwork: false
      hostPID: false

    replicaCount: 1
    deploymentStrategy:
      type: Recreate

    # Extra pod volume: the jellyfin-bootstrap-plugins ConfigMap (the plugin
    # list), read by the install-sso-plugin initContainer below.
    volumes:
      - name: bootstrap-plugins
        configMap:
          name: jellyfin-bootstrap-plugins

    # Install the configured plugins into the config volume before Jellyfin
    # starts, so they're loaded on first boot (the jellyfin-bootstrap Job then
    # configures them via the plugin API). Idempotent: skips any plugin already
    # present, so Jellyfin's own updates aren't clobbered.
    extraInitContainers:
      - name: install-sso-plugin
        image: ghcr.io/tomerhanochi/homelab/internal/bootstrap:0.1.0
        args: ["jellyfin", "install-plugin", "--config", "/etc/bootstrap/plugins.json"]
        securityContext:
          runAsNonRoot: true
          runAsUser: 1000
          runAsGroup: 1000
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop:
              - ALL
          seccompProfile:
            type: RuntimeDefault
        volumeMounts:
          - name: config
            mountPath: /config
          - name: bootstrap-plugins
            mountPath: /etc/bootstrap
            readOnly: true

    metrics:
      enabled: false
      serviceMonitor:
        enabled: false
