---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: jellyfin
  namespace: media
spec:
  interval: 30m
  chart:
    spec:
      chart: jellyfin
      version: "3.2.0"
      sourceRef:
        kind: HelmRepository
        name: jellyfin
  values:
    # Disable DLNA and service discovery (not needed with static DNS).
    jellyfin:
      enableDLNA: false
      publishDiscovery: false
      resources:
        requests:
          cpu: 500m
          memory: 1Gi
        limits:
          cpu: 4000m
          memory: 8Gi

    service:
      type: ClusterIP
      port: 8096
      portName: http

    # Exposed via the Gateway API HTTPRoute (route.yaml), not the chart ingress.
    ingress:
      enabled: false

    persistence:
      # Persistent settings/metadata on a dynamically-provisioned PVC.
      config:
        enabled: true
        accessMode: ReadWriteOnce
        size: 5Gi
        storageClass: ""
        type: pvc
      # Read-only view of the shared media library via a statically-provisioned
      # local PV/PVC (see persistentvolume.yaml). restricted PSA forbids the
      # previous hostPath mount.
      media:
        enabled: true
        type: pvc
        existingClaim: jellyfin-media
        accessMode: ReadOnlyMany
      cache:
        enabled: true
        type: emptyDir
        accessMode: ReadWriteOnce

    # NetworkPolicies are managed via CiliumNetworkPolicy in networkpolicies/.
    networkPolicy:
      enabled: false

    podSecurityContext:
      fsGroup: 1000
      seccompProfile:
        type: RuntimeDefault

    securityContext:
      runAsNonRoot: true
      runAsUser: 1000
      runAsGroup: 1000
      allowPrivilegeEscalation: false
      readOnlyRootFilesystem: false
      capabilities:
        drop:
          - ALL
      seccompProfile:
        type: RuntimeDefault

    serviceAccount:
      create: true
      automount: false

    podPrivileges:
      hostIPC: false
      hostNetwork: false
      hostPID: false

    replicaCount: 1
    deploymentStrategy:
      type: Recreate

    # Install the jellyfin-plugin-sso binary into the config volume before
    # Jellyfin starts, so the plugin is loaded on first boot (the jellyfin-oidc-
    # setup Job then configures it via the plugin API). Idempotent: skips if the
    # plugin is already present, so Jellyfin's own updates are never clobbered.
    extraInitContainers:
      - name: install-sso-plugin
        image: ghcr.io/tomerhanochi/homelab/internal/jellyfin-bootstrap:0.1.0
        args: ["install-plugin"]
        env:
          - name: PLUGIN_URL
            value: https://github.com/9p4/jellyfin-plugin-sso/releases/download/v4.0.0.4/sso-authentication_4.0.0.4.zip
          - name: PLUGIN_SHA256
            value: c09f16ba31059a434ddd7f811e4f9608d4b4c4514cc80a5bf1ca33bee61e1107
          - name: PLUGIN_DIR
            value: /config/plugins/SSO-Auth_4.0.0.4
        securityContext:
          runAsNonRoot: true
          runAsUser: 1000
          runAsGroup: 1000
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop:
              - ALL
          seccompProfile:
            type: RuntimeDefault
        volumeMounts:
          - name: config
            mountPath: /config

    metrics:
      enabled: false
      serviceMonitor:
        enabled: false
