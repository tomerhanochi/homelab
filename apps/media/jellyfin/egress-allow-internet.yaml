---
# Reaches authentik's OIDC issuer via the gateway LB IP, which Cilium classifies
# as world.
# TODO(tighten): restrict the OIDC hop to the gateway CIDR 192.168.68.64/32.
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: jellyfin-egress-internet
  namespace: media
spec:
  # Also covers the jellyfin-oidc-setup Job (OIDC discovery during bootstrap).
  endpointSelector:
    matchExpressions:
      - key: app.kubernetes.io/name
        operator: In
        values:
          - jellyfin
          - jellyfin-oidc-setup
  egress:
    - toEntities:
        - world
      toPorts:
        - ports:
            - port: "443"
              protocol: TCP
            - port: "80"
              protocol: TCP
