---
# Bootstrap config for Jellyfin. Shared by two consumers: the install-plugin
# initContainer in the HelmRelease (plugin.* only) and the jellyfin-bootstrap
# daemon (wizard + OIDC + libraries). Library paths are under /media (the chart's
# read-only media mount).
apiVersion: v1
kind: ConfigMap
metadata:
  name: jellyfin-bootstrap-config
  namespace: media
data:
  00-config.json: |
    {
      "url": "http://jellyfin:8096",
      "admin": { "username": "admin" },
      "oidc": {
        "provider": "authentik",
        "issuer": "https://sso.tomerhanochi.com/application/o/jellyfin/",
        "clientId": "jellyfin"
      },
      "libraries": [
        { "name": "Movies", "collectionType": "movies", "paths": ["/media/movies"] },
        { "name": "TV Shows", "collectionType": "tvshows", "paths": ["/media/tv"] }
      ],
      "plugin": {
        "url": "https://github.com/9p4/jellyfin-plugin-sso/releases/download/v4.0.0.4/sso-authentication_4.0.0.4.zip",
        "sha256": "c09f16ba31059a434ddd7f811e4f9608d4b4c4514cc80a5bf1ca33bee61e1107",
        "dir": "/config/plugins/SSO-Auth_4.0.0.4"
      }
    }
