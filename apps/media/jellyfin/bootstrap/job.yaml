---
# One-shot Job: finishes Jellyfin's first-run wizard, registers the authentik
# OIDC provider (via the jellyfin-plugin-sso API), and creates the configured
# libraries, then exits. Re-runs are Git-driven: the secretGenerator in
# kustomization.yaml hashes the config into the Secret name, so any config change
# renames the Secret, which changes this Job's (immutable) pod template, which
# Flux recreates (spec.force). See images/bootstrap.
apiVersion: batch/v1
kind: Job
metadata:
  name: jellyfin-bootstrap
  namespace: media
spec:
  backoffLimit: 6
  template:
    metadata:
      labels:
        app.kubernetes.io/name: jellyfin-bootstrap
    spec:
      restartPolicy: OnFailure
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: bootstrap
          image: ghcr.io/tomerhanochi/homelab/internal/bootstrap:0.1.0
          args: ["jellyfin", "configure"]
          volumeMounts:
            - name: config
              mountPath: /etc/bootstrap
              readOnly: true
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 200m
              memory: 128Mi
      volumes:
        - name: config
          secret:
            secretName: jellyfin-bootstrap-config
