---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: radarr
  namespace: media
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: radarr
  template:
    metadata:
      labels:
        app.kubernetes.io/name: radarr
    spec:
      # LinuxServer (s6-overlay) image run non-root: with runAsUser set, PUID/PGID
      # are ignored and the app runs as UID/GID 1000 directly, relying on fsGroup
      # 1000 + host dirs owned 1000:1000 (restricted PSA forbids the
      # root-then-drop startup). See https://docs.linuxserver.io/misc/non-root/.
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        # Movie PVR backend for seerr.
        - name: radarr
          image: lscr.io/linuxserver/radarr:latest@sha256:e35056574cdc695a9ee745aa1ecda9eab3842450bf4b7b8471b023790fa3861d  # yamllint disable-line rule:line-length
          ports:
            - name: http
              containerPort: 7878
          env:
            - name: UMASK
              value: "002"
            - name: TZ
              value: Europe/Amsterdam
            # Pin the API key (else Radarr generates a random one on first boot)
            # so it's stable and known for configuring integrations (e.g. the
            # Prowlarr/qBittorrent wiring) — see apikey.sops.yaml.
            - name: RADARR__AUTH__APIKEY
              valueFrom:
                secretKeyRef:
                  name: radarr-apikey
                  key: apikey
          volumeMounts:
            - name: config
              mountPath: /config
            # Whole shared library so Radarr can MOVE completed downloads from
            # torrents/ into media/ (exfat can't hardlink; see apps/AGENTS.md).
            - name: data
              mountPath: /data
            # Writable /run for s6-overlay. fsGroup 1000 makes the emptyDir
            # group-owned 1000 and group-writable, so s6 writes as our non-root
            # user — no world-writable /run needed (docs.linuxserver.io non-root
            # requires /run to match the user's UID/GID under no-new-privileges).
            - name: run
              mountPath: /run
          livenessProbe:
            httpGet:
              path: /ping
              port: http
            initialDelaySeconds: 30
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /ping
              port: http
            periodSeconds: 15
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            seccompProfile:
              type: RuntimeDefault
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 1000m
              memory: 1Gi
      volumes:
        - name: config
          persistentVolumeClaim:
            claimName: radarr-config
        - name: data
          persistentVolumeClaim:
            claimName: radarr-data
        - name: run
          emptyDir: {}
