---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: radarr
  namespace: media
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: radarr
  template:
    metadata:
      labels:
        app.kubernetes.io/name: radarr
    spec:
      # home-operations image: a plain rootless build of Radarr (no s6-overlay,
      # no PUID/PGID/root-then-drop), so it runs directly as UID/GID 1000 under
      # restricted PSA. Relies on fsGroup 1000 for the config PVC + host dirs
      # owned 1000:1000. See https://github.com/home-operations/containers.
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        # Movie PVR backend for seerr.
        - name: radarr
          image: ghcr.io/home-operations/radarr:6.0.0.10217@sha256:176205e666410114cccbdcd69e38b748b24ee4a2fa83a2ba5d0d49559a496d68  # yamllint disable-line rule:line-length
          ports:
            - name: http
              containerPort: 7878
          env:
            - name: TZ
              value: Europe/Amsterdam
            # Pin the API key (else Radarr generates a random one on first boot)
            # so it's stable and known for configuring integrations (e.g. the
            # Prowlarr/qBittorrent wiring) — see apikey.sops.yaml.
            - name: RADARR__AUTH__APIKEY
              valueFrom:
                secretKeyRef:
                  name: radarr-apikey
                  key: apikey
          volumeMounts:
            - name: config
              mountPath: /config
            # Whole shared library so Radarr can MOVE completed downloads from
            # torrents/ into media/ (exfat can't hardlink; see apps/AGENTS.md).
            - name: data
              mountPath: /data
          livenessProbe:
            httpGet:
              path: /ping
              port: http
            initialDelaySeconds: 30
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /ping
              port: http
            periodSeconds: 15
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            seccompProfile:
              type: RuntimeDefault
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 1000m
              memory: 1Gi
      volumes:
        - name: config
          persistentVolumeClaim:
            claimName: radarr-config
        - name: data
          persistentVolumeClaim:
            claimName: radarr-data
