---
# Statically-provisioned hostPath PV (not `local`) pinned to the node that owns
# /var/mnt/data, because kubelet relabels `local` volumes and that fails on the
# exfat context= mount (no xattrs); hostPath volumes are never relabeled.
# hostPath-via-PVC stays restricted-PSA compliant (PSA only checks the pod).
# radarr mounts the whole library to MOVE completed downloads from /data/torrents
# into /data/media (exfat can't hardlink). Host dir must be owned by 1000:1000.
apiVersion: v1
kind: PersistentVolume
metadata:
  name: media-radarr-data
spec:
  capacity:
    storage: 1Ti
  accessModes:
    - ReadWriteOnce
  persistentVolumeReclaimPolicy: Retain
  # Empty storageClassName + explicit claim binding keeps the default local-path
  # provisioner from touching this volume.
  storageClassName: ""
  hostPath:
    path: /var/mnt/data
    type: Directory
  nodeAffinity:
    required:
      nodeSelectorTerms:
        - matchExpressions:
            - key: kubernetes.io/hostname
              operator: In
              values:
                - control-plane
