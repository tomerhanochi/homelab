---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: sonarr
  namespace: media
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: sonarr
  template:
    metadata:
      labels:
        app.kubernetes.io/name: sonarr
    spec:
      # LinuxServer (s6-overlay) image run non-root: with runAsUser set, PUID/PGID
      # are ignored and the app runs as UID/GID 1000 directly, relying on fsGroup
      # 1000 + host dirs owned 1000:1000 (restricted PSA forbids the
      # root-then-drop startup). See https://docs.linuxserver.io/misc/non-root/.
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        # TV PVR backend for seerr (not publicly exposed).
        - name: sonarr
          image: lscr.io/linuxserver/sonarr:latest@sha256:24acea2956a0ccb11f103877d9f4f8576600fb34bff34820ed749c2256dab89f  # yamllint disable-line rule:line-length
          ports:
            - name: http
              containerPort: 8989
          env:
            - name: UMASK
              value: "002"
            - name: TZ
              value: Europe/Amsterdam
            # Pin the API key (else Sonarr generates a random one on first boot)
            # so it's stable and known for configuring integrations (e.g. the
            # Prowlarr/qBittorrent wiring) — see apikey.sops.yaml.
            - name: SONARR__AUTH__APIKEY
              valueFrom:
                secretKeyRef:
                  name: sonarr-apikey
                  key: apikey
          volumeMounts:
            - name: config
              mountPath: /config
            # Whole shared library so Sonarr can MOVE completed downloads from
            # /data/torrents into /data/media (exfat can't hardlink).
            - name: data
              mountPath: /data
            # Writable /run for s6-overlay. fsGroup 1000 makes the emptyDir
            # group-owned 1000 and group-writable, so s6 writes as our non-root
            # user — no world-writable /run needed (docs.linuxserver.io non-root
            # requires /run to match the user's UID/GID under no-new-privileges).
            - name: run
              mountPath: /run
          livenessProbe:
            httpGet:
              path: /ping
              port: http
            initialDelaySeconds: 30
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /ping
              port: http
            periodSeconds: 15
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            seccompProfile:
              type: RuntimeDefault
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 1000m
              memory: 1Gi
      volumes:
        - name: config
          persistentVolumeClaim:
            claimName: sonarr-config
        - name: data
          persistentVolumeClaim:
            claimName: sonarr-data
        - name: run
          emptyDir: {}
