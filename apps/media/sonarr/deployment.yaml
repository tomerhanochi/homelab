---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: sonarr
  namespace: media
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: sonarr
  template:
    metadata:
      labels:
        app.kubernetes.io/name: sonarr
    spec:
      # hotio (s6-overlay) image runs rootless here: with no PUID/PGID the
      # process stays UID/GID 1000, relying on fsGroup 1000 + host dirs owned
      # 1000:1000 (restricted PSA forbids the root-then-drop startup).
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        # TV PVR backend for seerr (not publicly exposed).
        - name: sonarr
          image: ghcr.io/hotio/sonarr:release@sha256:a01185d990725bb77bef19627e6aa9431d31dbb5607433e38d5c864fd10d36ff  # yamllint disable-line rule:line-length
          ports:
            - name: http
              containerPort: 8989
          env:
            - name: UMASK
              value: "002"
            - name: TZ
              value: Europe/Amsterdam
          volumeMounts:
            - name: config
              mountPath: /config
            # Whole shared library so hardlinks between /data/torrents and
            # /data/media work.
            - name: data
              mountPath: /data
          livenessProbe:
            httpGet:
              path: /ping
              port: http
            initialDelaySeconds: 30
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /ping
              port: http
            periodSeconds: 15
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            seccompProfile:
              type: RuntimeDefault
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 1000m
              memory: 1Gi
      volumes:
        - name: config
          persistentVolumeClaim:
            claimName: sonarr-config
        - name: data
          persistentVolumeClaim:
            claimName: sonarr-data
