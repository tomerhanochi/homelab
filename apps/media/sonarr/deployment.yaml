---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: sonarr
  namespace: media
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: sonarr
  template:
    metadata:
      labels:
        app.kubernetes.io/name: sonarr
    spec:
      # home-operations image: a plain rootless build of Sonarr (no s6-overlay,
      # no PUID/PGID/root-then-drop), so it runs directly as UID/GID 1000 under
      # restricted PSA. Relies on fsGroup 1000 for the config PVC + host dirs
      # owned 1000:1000. See https://github.com/home-operations/containers.
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        # TV PVR backend for seerr (not publicly exposed).
        - name: sonarr
          image: ghcr.io/home-operations/sonarr:4.0.18.2978@sha256:2cd77fb3d81909a734d61bb8f71462044cb9d2f187e626a28a05a5c4e4be8fd2  # yamllint disable-line rule:line-length
          ports:
            - name: http
              containerPort: 8989
          env:
            - name: TZ
              value: Europe/Amsterdam
            # Pin the API key (else Sonarr generates a random one on first boot)
            # so it's stable and known for configuring integrations (e.g. the
            # Prowlarr/qBittorrent wiring) — see apikey.sops.yaml.
            - name: SONARR__AUTH__APIKEY
              valueFrom:
                secretKeyRef:
                  name: sonarr-apikey
                  key: apikey
          volumeMounts:
            - name: config
              mountPath: /config
            # Whole shared library so Sonarr can MOVE completed downloads from
            # /data/torrents into /data/media (exfat can't hardlink).
            - name: data
              mountPath: /data
          livenessProbe:
            httpGet:
              path: /ping
              port: http
            initialDelaySeconds: 30
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /ping
              port: http
            periodSeconds: 15
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            seccompProfile:
              type: RuntimeDefault
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 1000m
              memory: 1Gi
      volumes:
        - name: config
          persistentVolumeClaim:
            claimName: sonarr-config
        - name: data
          persistentVolumeClaim:
            claimName: sonarr-data
