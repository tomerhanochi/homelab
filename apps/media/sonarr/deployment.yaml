---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: sonarr
  namespace: media
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: sonarr
  template:
    metadata:
      labels:
        app.kubernetes.io/name: sonarr
    spec:
      # hotio (s6-overlay) image runs rootless here: with no PUID/PGID the
      # process stays UID/GID 1000, relying on fsGroup 1000 + host dirs owned
      # 1000:1000 (restricted PSA forbids the root-then-drop startup).
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        # TV PVR backend for seerr (not publicly exposed).
        - name: sonarr
          image: ghcr.io/hotio/sonarr:release@sha256:a01185d990725bb77bef19627e6aa9431d31dbb5607433e38d5c864fd10d36ff  # yamllint disable-line rule:line-length
          ports:
            - name: http
              containerPort: 8989
          env:
            - name: UMASK
              value: "002"
            - name: TZ
              value: Europe/Amsterdam
            # Let s6-overlay boot rootless: it wants to own/chown /run but can't
            # under restricted PSA (no CAP_CHOWN). This tells it to accept a
            # world-writable /run (the emptyDir below) instead of fixing it.
            - name: S6_YES_I_WANT_A_WORLD_WRITABLE_RUN_BECAUSE_KUBERNETES
              value: "1"
            # Pin the API key (else Sonarr generates a random one on first boot)
            # so it's stable and known for configuring integrations (e.g. the
            # Prowlarr/qBittorrent wiring) — see apikey.sops.yaml.
            - name: SONARR__AUTH__APIKEY
              valueFrom:
                secretKeyRef:
                  name: sonarr-apikey
                  key: apikey
          volumeMounts:
            - name: config
              mountPath: /config
            # Whole shared library so Sonarr can MOVE completed downloads from
            # /data/torrents into /data/media (exfat can't hardlink).
            - name: data
              mountPath: /data
            # Writable /run for s6-overlay (see the S6_ env above).
            - name: run
              mountPath: /run
          livenessProbe:
            httpGet:
              path: /ping
              port: http
            initialDelaySeconds: 30
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /ping
              port: http
            periodSeconds: 15
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            seccompProfile:
              type: RuntimeDefault
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 1000m
              memory: 1Gi
      volumes:
        - name: config
          persistentVolumeClaim:
            claimName: sonarr-config
        - name: data
          persistentVolumeClaim:
            claimName: sonarr-data
        - name: run
          emptyDir: {}
