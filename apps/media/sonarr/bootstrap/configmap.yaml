---
# Non-secret bootstrap config. The API key is secret (secret.sops.yaml). The
# download client points at qBittorrent cross-namespace; no creds are set because
# qBittorrent authorizes the pod network via its WebUI subnet whitelist.
# removeCompletedDownloads=true makes Sonarr MOVE the completed download into the
# library instead of copying (paired with qBittorrent stopping on seed-limit) —
# the workaround for the exFAT volume not supporting hardlinks.
apiVersion: v1
kind: ConfigMap
metadata:
  name: sonarr-bootstrap-config
  namespace: media
data:
  00-config.json: |
    {
      "url": "http://sonarr:8989",
      "rootFolders": ["/data/media/tv"],
      "downloadClient": {
        "name": "qBittorrent",
        "host": "qbittorrent.qbittorrent",
        "port": 8080,
        "category": "tv-sonarr",
        "useSsl": false,
        "removeCompletedDownloads": true
      }
    }
