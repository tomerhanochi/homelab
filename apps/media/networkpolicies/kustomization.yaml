---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Open intra-namespace flows (seerr <-> jellyfin/sonarr/radarr) in both
# directions; cluster-wide default-deny lives in apps/cluster. Per-component
# gateway ingress is granted by each app's ingress-allow-gateway.yaml.
resources:
  - ingress-allow-intra-namespace.yaml
  - egress-allow-intra-namespace.yaml
