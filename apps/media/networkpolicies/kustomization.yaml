---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Namespace-wide policies. Cluster-wide default-deny (ingress + egress) lives in
# apps/cluster; these open the intra-namespace flows (seerr <-> jellyfin/sonarr/
# radarr) in both directions. Gateway ingress is granted cluster-wide via the
# gateway.tomerhanochi.com/exposed pod label (jellyfin, seerr).
resources:
  - ingress-allow-intra-namespace.yaml
  - egress-allow-intra-namespace.yaml
