---
# seerr reaches the TMDB API (HTTPS) for metadata/search.
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: seerr-egress-internet
  namespace: media
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/name: seerr
  egress:
    - toEntities:
        - world
      toPorts:
        - ports:
            - port: "443"
              protocol: TCP
