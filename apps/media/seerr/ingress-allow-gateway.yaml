---
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: seerr-ingress-gateway
  namespace: media
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/name: seerr
  ingress:
    - fromEntities:
        - ingress
      toPorts:
        - ports:
            - port: "5055"
              protocol: TCP
