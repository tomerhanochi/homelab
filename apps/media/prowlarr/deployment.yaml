---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prowlarr
  namespace: media
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: prowlarr
  template:
    metadata:
      labels:
        app.kubernetes.io/name: prowlarr
    spec:
      # home-operations image: a plain rootless build of Prowlarr (no s6-overlay,
      # no PUID/PGID/root-then-drop), so it runs directly as UID/GID 1000 under
      # restricted PSA. Relies on fsGroup 1000 for the config PVC.
      # See https://github.com/home-operations/containers.
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        # Indexer manager that feeds sonarr/radarr (not publicly exposed).
        # Only needs its own /config; unlike son/radarr it never touches the
        # media library, so there's no /data mount.
        - name: prowlarr
          image: ghcr.io/home-operations/prowlarr:2.1.5.5216@sha256:affb671fa367f4b7029d58f4b7d04e194e887ed6af1cf5a678f3c7aca5caf6ca  # yamllint disable-line rule:line-length
          ports:
            - name: http
              containerPort: 9696
          env:
            - name: TZ
              value: Europe/Amsterdam
            # Pin the API key (else Prowlarr generates a random one on first
            # boot) so it's stable and known for configuring integrations
            # (e.g. the sonarr/radarr application wiring) — see apikey.sops.yaml.
            - name: PROWLARR__AUTH__APIKEY
              valueFrom:
                secretKeyRef:
                  name: prowlarr-apikey
                  key: apikey
          volumeMounts:
            - name: config
              mountPath: /config
          livenessProbe:
            httpGet:
              path: /ping
              port: http
            initialDelaySeconds: 30
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /ping
              port: http
            periodSeconds: 15
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            seccompProfile:
              type: RuntimeDefault
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 1000m
              memory: 1Gi
      volumes:
        - name: config
          persistentVolumeClaim:
            claimName: prowlarr-config
