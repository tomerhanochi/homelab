---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: radarr
  namespace: radarr
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: radarr
  template:
    metadata:
      labels:
        app.kubernetes.io/name: radarr
    spec:
      # hotio (s6-overlay) image starts as root to apply PUID/PGID then drops
      # privileges, so runAsNonRoot is intentionally not set.
      securityContext:
        fsGroup: 1000
      containers:
        # Movie PVR backend for jellyseerr.
        - name: radarr
          image: ghcr.io/hotio/radarr:release@sha256:4b334f33ae74337668b7c8a4ce1ff6b3e1a8b1e298812c6113ee4ad7e19fbaee
          ports:
            - name: http
              containerPort: 7878
          env:
            - name: PUID
              value: "1000"
            - name: PGID
              value: "1000"
            - name: UMASK
              value: "002"
            - name: TZ
              value: Europe/Amsterdam
          volumeMounts:
            - name: config
              mountPath: /config
            # Whole shared library mounted so hardlinks work across
            # media/ and torrents/ (see apps/AGENTS.md storage convention).
            - name: data
              mountPath: /data
          livenessProbe:
            httpGet:
              path: /ping
              port: http
            initialDelaySeconds: 30
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /ping
              port: http
            periodSeconds: 15
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 1000m
              memory: 1Gi
      volumes:
        - name: config
          persistentVolumeClaim:
            claimName: radarr-config
        - name: data
          hostPath:
            path: /var/mnt/data
            type: DirectoryOrCreate
