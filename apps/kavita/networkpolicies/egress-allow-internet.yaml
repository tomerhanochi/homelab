---
# Kavita reaches authentik's OIDC issuer via the gateway (sso.tomerhanochi.com ->
# gateway LB IP, which Cilium classifies as world) and optionally fetches cover
# metadata. TODO: tighten the OIDC hop to the gateway CIDR 192.168.68.64/32 once
# the world exit is split out.
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: egress-allow-internet
  namespace: kavita
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/name: kavita
  egress:
    - toEntities:
        - world
      toPorts:
        - ports:
            - port: "443"
              protocol: TCP
