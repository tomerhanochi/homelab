# TEMPLATE ONLY — the real secret ships SOPS-encrypted in this directory
# (oidc-secret.sops.yaml); this file just documents its shape. Not referenced by
# kustomization.
#
# Consumed by the kavita-oidc-setup Job. The first admin is created via
# POST /api/Account/register and kept alongside SSO so you can't be locked out.
# OIDC_CLIENT_SECRET MUST match KAVITA_CLIENT_SECRET in
# apps/authentik/oidc-secret.sops.yaml.
---
apiVersion: v1
kind: Secret
metadata:
  name: kavita-oidc
  namespace: kavita
type: Opaque
stringData:
  KAVITA_ADMIN_USER: admin
  KAVITA_ADMIN_PASSWORD: "REPLACE_WITH_RANDOM_PASSWORD"
  KAVITA_ADMIN_EMAIL: admin@tomerhanochi.com
  OIDC_CLIENT_SECRET: "REPLACE_WITH_OIDC_CLIENT_SECRET"
