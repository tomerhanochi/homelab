---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - serviceaccount.yaml
  - role.yaml
  - rolebinding.yaml
  - job.yaml

# The whole bootstrap config (non-secret settings + secrets) lives in one
# SOPS-encrypted file. Flux decrypts it before build; the content-hash suffix
# kustomize appends to the Secret name is what makes the Job re-run on change.
secretGenerator:
  - name: kavita-bootstrap-config
    namespace: kavita
    files:
      # secret key = config.json (mounted at /etc/bootstrap/config.json), read
      # from the SOPS-encrypted source file.
      - config.json=config.sops.json
