---
# One-shot Job: configures Kavita once (first admin, OIDC, libraries) and exits.
# Re-runs are Git-driven, not a daemon: the secretGenerator in kustomization.yaml
# hashes the config into the Secret name, so any config change renames the Secret,
# which changes this Job's (immutable) pod template, which Flux recreates
# (spec.force). See images/bootstrap.
apiVersion: batch/v1
kind: Job
metadata:
  name: kavita-bootstrap
  namespace: kavita
spec:
  backoffLimit: 6
  template:
    metadata:
      labels:
        app.kubernetes.io/name: kavita-bootstrap
    spec:
      restartPolicy: OnFailure
      serviceAccountName: kavita-bootstrap
      automountServiceAccountToken: true
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: bootstrap
          image: ghcr.io/tomerhanochi/homelab/internal/bootstrap:0.1.0
          args: ["kavita", "configure"]
          volumeMounts:
            - name: config
              mountPath: /etc/bootstrap
              readOnly: true
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 200m
              memory: 128Mi
      volumes:
        # The bootstrap config Secret, generated (and hash-suffixed) from the
        # SOPS-encrypted config.json by kustomization.yaml's secretGenerator.
        - name: config
          secret:
            secretName: kavita-bootstrap-config
