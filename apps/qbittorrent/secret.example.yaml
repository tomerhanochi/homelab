# TEMPLATE ONLY — the real secret is generated and SOPS-encrypted at bootstrap;
# see scripts/. Not referenced by kustomization.
---
apiVersion: v1
kind: Secret
metadata:
  name: qbittorrent-vpn
  namespace: qbittorrent
type: Opaque
stringData:
  # ProtonVPN WireGuard private key from the Proton portal.
  WIREGUARD_PRIVATE_KEY: "REPLACE_ME"
  # WireGuard interface address, e.g. 10.2.0.2/32.
  WIREGUARD_ADDRESSES: "10.2.0.2/32"
