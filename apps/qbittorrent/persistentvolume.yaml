---
# The shared download/library volume is exposed through a statically-provisioned
# `local` PersistentVolume pinned to the node that owns /var/mnt/data (see
# apps/AGENTS.md storage convention). qBittorrent needs read-write here to write
# completed downloads that sonarr/radarr later MOVE into the library — exfat can't
# hardlink, so qBittorrent stops seeding on completion (bootstrap: max_ratio_act=0)
# and the *arrs move instead of copy. The host dir must be owned by UID/GID 1000.
apiVersion: v1
kind: PersistentVolume
metadata:
  name: qbittorrent-data
spec:
  capacity:
    storage: 1Ti
  accessModes:
    - ReadWriteOnce
  persistentVolumeReclaimPolicy: Retain
  # Empty storageClassName + explicit claim binding keeps the default local-path
  # provisioner from touching this volume.
  storageClassName: ""
  local:
    path: /var/mnt/data
  nodeAffinity:
    required:
      nodeSelectorTerms:
        - matchExpressions:
            - key: kubernetes.io/hostname
              operator: In
              values:
                - control-plane
