---
# sonarr/radarr (now in the `media` namespace) call qBittorrent's WebUI/API on
# 8080 to add torrents.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: ingress-allow-arr
  namespace: qbittorrent
spec:
  podSelector: {}
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: media
      ports:
        - protocol: TCP
          port: 8080
