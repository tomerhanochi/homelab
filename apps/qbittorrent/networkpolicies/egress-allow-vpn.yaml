---
# gluetun's WireGuard tunnel and BitTorrent peer traffic use arbitrary UDP/TCP
# ports to the public internet, so egress to `world` is allowed with no port
# restriction. This is the one namespace where broad internet egress is expected.
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: egress-allow-vpn
  namespace: qbittorrent
spec:
  endpointSelector: {}
  egress:
    - toEntities:
        - world
