---
# Non-secret bootstrap config. No secret is needed: the daemon reaches
# qBittorrent from the pod network, which the seeded WebUI subnet whitelist (see
# ../deployment.yaml initContainer) authorizes without a password, so no login is
# performed. max_ratio_act=0 (Stop) + max_ratio=0 makes torrents stop on
# completion so Sonarr/Radarr MOVE instead of copy (the exFAT/no-hardlink fix).
apiVersion: v1
kind: ConfigMap
metadata:
  name: qbittorrent-bootstrap-config
  namespace: qbittorrent
data:
  00-config.json: |
    {
      "url": "http://qbittorrent:8080",
      "preferences": {
        "max_ratio_enabled": true,
        "max_ratio": 0,
        "max_ratio_act": 0,
        "max_seeding_time_enabled": false
      },
      "categories": [
        { "name": "tv-sonarr", "savePath": "/data/torrents/tv" },
        { "name": "radarr", "savePath": "/data/torrents/movies" }
      ]
    }
