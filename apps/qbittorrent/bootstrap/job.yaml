---
# One-shot Job: applies qBittorrent's WebUI preferences (share-limit/stop) and
# categories, then exits. No secret is needed — the Job reaches qBittorrent from
# the pod network, which the seeded WebUI subnet whitelist authorizes without a
# password. Re-runs are Git-driven: the configMapGenerator in kustomization.yaml
# hashes the config into the ConfigMap name, so any config change renames it,
# which changes this Job's (immutable) pod template, which Flux recreates
# (spec.force). See images/bootstrap.
apiVersion: batch/v1
kind: Job
metadata:
  name: qbittorrent-bootstrap
  namespace: qbittorrent
spec:
  backoffLimit: 6
  template:
    metadata:
      labels:
        app.kubernetes.io/name: qbittorrent-bootstrap
    spec:
      restartPolicy: OnFailure
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: bootstrap
          image: ghcr.io/tomerhanochi/homelab/internal/bootstrap:0.1.0
          args: ["qbittorrent", "configure"]
          volumeMounts:
            - name: config
              mountPath: /etc/bootstrap
              readOnly: true
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 200m
              memory: 128Mi
      volumes:
        - name: config
          configMap:
            name: qbittorrent-bootstrap-config
