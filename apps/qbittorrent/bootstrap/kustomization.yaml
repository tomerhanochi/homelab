---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - job.yaml

# qBittorrent's bootstrap config has no secrets (see job.yaml), so it's a plain
# ConfigMap. The content-hash suffix kustomize appends to the ConfigMap name is
# what makes the Job re-run on change.
configMapGenerator:
  - name: qbittorrent-bootstrap-config
    namespace: qbittorrent
    files:
      - config.json
